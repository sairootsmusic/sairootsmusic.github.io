name: SAI Roots Optimizer Fix

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Custom Sitemap
        run: |
          # Buat file sitemap dasar
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml
          
          # Masukkan halaman utama dan statis
          echo '<url><loc>https://sairootmusic.com/</loc><priority>1.0</priority></url>' >> sitemap.xml
          echo '<url><loc>https://sairootmusic.com/artikel</loc><priority>0.8</priority></url>' >> sitemap.xml
          
          # MASUKKAN 28 LAGU SECARA PAKSA
          for song in drama-klenik senandung-manis eksploitasi jurus-liar dari-jauh kasih-mengalun genjer-hijau timpang babylon-burn bayang-singgasana blaze-it-up evaluasi-lagi irama-hidup jamaican-sound ormas-tipu-tipu propaganda roots-medication skank-patrol reborn-riddim autopsi-mic salam-dari-timur mantra-malam magic-mushroom rastaman melayang-pelan tanah-hijau bbm-busuk kabur-saja-dulu; do
            echo "<url><loc>https://sairootmusic.com/music?song=$song</loc><priority>0.5</priority></url>" >> sitemap.xml
          done
          
          echo '</urlset>' >> sitemap.xml

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add sitemap.xml
          git commit -m "Fix: Force 28 songs into sitemap" || echo "No changes"
          git push
