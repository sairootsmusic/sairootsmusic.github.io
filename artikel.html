<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articles | SAI Roots</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0b0b; color: #e5e7eb; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        .sai-card { background: #141414; border: 1px solid #222; border-radius: 12px; overflow: hidden; transition: 0.2s; }
        .sai-card:hover { border-color: #3b82f6; }
        .btn-home { color: #666; font-size: 14px; font-weight: 600; transition: 0.3s; }
        .btn-home:hover { color: #fff; }
        .img-placeholder { width: 100%; height: 180px; background: linear-gradient(45deg, #111, #1a1a1a); display: flex; items-center; justify-center; }
    </style>
</head>
<body class="pb-10">

    <nav class="p-6 max-w-4xl mx-auto flex items-center justify-between w-full">
        <a href="/" class="btn-home"><i class="fa-solid fa-chevron-left mr-2"></i>Home</a>
        <div class="text-right">
            <h1 class="text-2xl font-black uppercase italic tracking-tighter">LIST <span class="text-blue-500">ARTICLE</span></h1>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 mt-4 flex-grow w-full">
        <div id="article-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="col-span-full text-center py-20 text-zinc-800 text-[10px] font-black uppercase tracking-[0.3em]">Loading Database...</div>
        </div>
    </main>

    <footer class="py-10 text-center">
        <p class="text-[10px] text-zinc-800 font-bold uppercase tracking-widest">© 2026 SAI Roots Music. All Rights Reserved.</p>
    </footer>

    <script>
        const REPO = "sairootsmusic/sairootsmusic.github.io";
        const FOLDER = "artikel";

        async function init() {
            const list = document.getElementById('article-list');
            try {
                // HANYA AMBIL DAFTAR FILE (SANGAT CEPAT)
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FOLDER}`);
                const files = await res.json();
                
                if(!Array.isArray(files)) throw new Error();

                const htmlFiles = files.filter(f => f.name.endsWith('.html')).reverse();
                list.innerHTML = "";

                htmlFiles.forEach(file => {
                    // Judul diambil otomatis dari nama file biar instan
                    // Contoh: 'album-critical-fire.html' -> 'ALBUM CRITICAL FIRE'
                    const cleanTitle = file.name
                        .replace('.html', '')
                        .replace(/-/g, ' ')
                        .toUpperCase();

                    const card = `
                        <a href="artikel/${file.name}" class="sai-card group block no-underline">
                            <div class="img-placeholder">
                                <i class="fa-solid fa-newspaper text-zinc-800 text-4xl group-hover:text-blue-500 transition-colors"></i>
                            </div>
                            <div class="p-5">
                                <span class="text-[9px] text-blue-500 font-black tracking-widest uppercase">Latest Post</span>
                                <h2 class="text-lg font-bold text-white mt-1 leading-tight group-hover:text-blue-400 transition-colors">${cleanTitle}</h2>
                                <div class="mt-4 flex items-center text-zinc-600 text-[10px] font-bold uppercase tracking-widest">
                                    View Article <i class="fa-solid fa-arrow-right ml-2 text-[8px]"></i>
                                </div>
                            </div>
                        </a>
                    `;
                    list.innerHTML += card;
                });

            } catch (e) {
                list.innerHTML = `<div class="col-span-full text-center py-20 text-red-900 font-black text-xs">DATABASE SYNC ERROR</div>`;
            }
        }

        init();
    </script>
</body>
</html>
