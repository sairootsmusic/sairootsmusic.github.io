<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cover Collection by SAI Roots</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .video-card { background: #111; border-radius: 15px; border: 1px solid #222; transition: 0.3s; cursor: pointer; }
        .video-card:hover { border-color: #3b82f6; }
        
        /* Modal & Minimize Logic */
        #videoModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; overflow-y: auto; transition: 0.3s; }
        #videoModal.minimized { 
            inset: auto; right: 15px; bottom: 80px; width: 300px; height: auto; 
            background: #1a1a1a; border: 2px solid #3b82f6; border-radius: 12px; overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); z-index: 1000;
        }
        #videoModal.minimized .desc-content { display: none; }
        #videoModal.minimized .header-controls { background: #000; padding: 5px 10px; }
        
        .aspect-video { position: relative; padding-bottom: 56.25%; height: 0; }
        .aspect-video iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .line-clamp { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body>

    <nav class="p-5 flex items-center justify-between sticky top-0 bg-black/80 backdrop-blur-md z-50 border-b border-zinc-900">
        <a href="/" class="text-zinc-400 hover:text-white flex items-center gap-1 font-medium">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> HOME
        </a>
        <div class="text-xl font-black italic uppercase tracking-tighter">
            COVER <span class="text-blue-500">COLLECTION</span>
        </div>
        <div class="w-12"></div>
    </nav>

    <div class="max-w-5xl mx-auto p-6">
        <h1 class="text-2xl font-bold mb-6 text-center">Cover Collection by SAI Roots</h1>
        
        <input type="text" id="searchInput" placeholder="Cari koleksi video..." 
               class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-2xl mb-10 focus:ring-2 focus:ring-blue-600 outline-none">

        <div id="videoGrid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            </div>
    </div>

    <div id="videoModal">
        <div class="max-w-4xl mx-auto md:mt-10 bg-black rounded-2xl overflow-hidden shadow-2xl border border-zinc-800">
            <div class="header-controls flex justify-between p-4 bg-zinc-900/50">
                <button onclick="toggleMinimize()" class="text-blue-400 font-bold text-xs uppercase tracking-widest">[-] Minimize</button>
                <button onclick="closeModal()" class="text-red-500 font-bold text-xs uppercase tracking-widest">✕ Close</button>
            </div>
            
            <div class="aspect-video" id="player"></div>
            
            <div class="p-6 desc-content">
                <h2 id="mTitle" class="text-2xl font-bold mb-4"></h2>
                <div class="flex items-center gap-2 mb-6">
                    <span class="bg-blue-600 text-[10px] font-bold px-2 py-1 rounded">ARTICLE</span>
                    <span class="text-zinc-500 text-xs font-bold uppercase">SAI Roots Music</span>
                </div>
                <div id="mDesc" class="text-zinc-400 text-sm leading-relaxed whitespace-pre-wrap border-t border-zinc-800 pt-4"></div>
            </div>
        </div>
    </div>

    <script>
        let videoData = [];

        async function load() {
            try {
                const r = await fetch('videos.json');
                videoData = await r.json();
                display(videoData);
                
                // SEO Indexing Check
                if(window.location.hash) openModal(window.location.hash.substring(1));
            } catch(e) { console.log("Belum ada video."); }
        }

        function display(data) {
            const g = document.getElementById('videoGrid');
            g.innerHTML = data.map(v => `
                <div class="video-card overflow-hidden" onclick="openModal('${v.id}')">
                    <img src="https://img.youtube.com/vi/${v.id}/maxresdefault.jpg" class="w-full aspect-video object-cover">
                    <div class="p-5">
                        <div class="text-blue-500 text-[10px] font-bold mb-2 tracking-widest uppercase">Article | SAI Roots</div>
                        <h3 class="font-bold text-lg mb-2 uppercase leading-tight">${v.title}</h3>
                        <p class="text-zinc-500 text-xs line-clamp">${v.description.substring(0, 120)}...</p>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id) {
            const v = videoData.find(x => x.id === id);
            if(!v) return;
            window.location.hash = id;
            document.getElementById('player').innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allowfullscreen></iframe>`;
            document.getElementById('mTitle').innerText = v.title;
            document.getElementById('mDesc').innerText = v.description;
            const m = document.getElementById('videoModal');
            m.style.display = 'block';
            m.classList.remove('minimized');
            document.body.style.overflow = 'hidden';
        }

        function toggleMinimize() {
            const m = document.getElementById('videoModal');
            m.classList.toggle('minimized');
            document.body.style.overflow = m.classList.contains('minimized') ? 'auto' : 'hidden';
        }

        function closeModal() {
            document.getElementById('videoModal').style.display = 'none';
            document.getElementById('player').innerHTML = '';
            document.body.style.overflow = 'auto';
            history.pushState("", document.title, window.location.pathname);
        }

        document.getElementById('searchInput').addEventListener('input', e => {
            const t = e.target.value.toLowerCase();
            display(videoData.filter(v => v.title.toLowerCase().includes(t)));
        });

        window.onload = load;
    </script>
</body>
</html>
