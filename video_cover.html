<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png">
    <link rel="manifest" href="/site.webmanifest">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cover Collection by SAI Roots</title>
    <meta name="description" content="Kumpulan video cover dari SAI Roots.">
    <meta name="theme-color" content="#0b0b0b">
    <meta name="msapplication-TileColor" content="#000000">

    <meta property="og:site_name" content="SAI Roots Music">
    <meta property="og:type" content="website">
    <meta property="og:url" content="video_cover">
    <meta property="og:title" content="Cover Collection by SAI Roots">
    <meta property="og:description" content="Cover Collection by SAI Roots.">
    <meta property="og:image" content="https://raw.githubusercontent.com/pembri/SAI-Roots-Official/main/sairoots.jpg">

    <script type="application/ld+json">
    {
      "@type": "WebSite",
      "name": "SAI Roots Music",
      "url": "https://sairootsmusic.github.io"
    },
    {
      "@context": "https://schema.org",
      "@type": "CollectionPage",
      "name": "SAI Roots Articles",
      "description": "Archive of music articles and news by SAI Roots Music",
      "url": "https://sairootsmusic.github.io/artikel"
    }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        /* Aksen Hijau pada Hover Card */
        .video-card { background: #111; border-radius: 15px; border: 1px solid #222; transition: 0.3s; cursor: pointer; position: relative; overflow: hidden; }
        .video-card:hover { border-color: #22c55e; } 
        
        #videoModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; overflow-y: auto; transition: 0.3s; }
        #videoModal.minimized { 
            inset: auto; right: 15px; bottom: 80px; width: 300px; height: auto; 
            background: #1a1a1a; border: 2px solid #22c55e; border-radius: 12px; overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); z-index: 1000;
        }
        #videoModal.minimized .desc-content { display: none; }
        #videoModal.minimized .header-controls { background: #000; padding: 5px 10px; }
        
        .aspect-video { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .aspect-video #youtube-player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border:0; }
        .line-clamp { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .thumb-container { background: #1a1a1a; width: 100%; position: relative; padding-bottom: 56.25%; }
        .thumb-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <nav class="p-5 flex items-center justify-between sticky top-0 bg-black/80 backdrop-blur-md z-50 border-b border-zinc-900">
        <a href="/" class="text-zinc-400 hover:text-white flex items-center gap-1 font-medium transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path>
            </svg>
            <span class="text-sm tracking-wide uppercase">Home</span>
        </a>
        
        <div class="text-xl font-black italic uppercase tracking-tighter">
            COVER <span class="text-green-500">COLLECTION</span>
        </div>
        <div class="w-16"></div> </nav>

    <div class="max-w-5xl mx-auto p-6">
        <input type="text" id="searchInput" placeholder="Cari koleksi video..." 
               class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-2xl mb-10 focus:ring-2 focus:ring-green-600 outline-none">

        <div id="videoGrid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
    </div>

    <div id="videoModal">
        <div class="max-w-4xl mx-auto md:mt-10 bg-black rounded-2xl overflow-hidden shadow-2xl border border-zinc-800">
            <div class="header-controls flex justify-between p-4 bg-zinc-900/50">
                <button onclick="toggleMinimize()" class="text-green-400 font-bold text-xs uppercase tracking-widest">[-] Minimize</button>
                <button onclick="closeModal()" class="text-red-500 font-bold text-xs uppercase tracking-widest">✕ Close</button>
            </div>
            
            <div class="aspect-video">
                <div id="youtube-player"></div>
            </div>
            
            <div class="p-6 desc-content">
                <h2 id="mTitle" class="text-2xl font-bold mb-4"></h2>
                <div class="flex items-center gap-2 mb-6">
                    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="#ff0000"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                    <span class="text-zinc-400 text-xs font-bold uppercase tracking-wider">SAI Roots</span>
                </div>
                <div id="mDesc" class="text-zinc-400 text-sm leading-relaxed whitespace-pre-wrap border-t border-zinc-800 pt-4"></div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let videoData = [];
        let player;
        let currentVideoId = '';

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                playerVars: { 'autoplay': 1, 'rel': 0, 'enablejsapi': 1 },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.ENDED) {
                playNextVideo();
            }
        }

        function playNextVideo() {
            const currentIndex = videoData.findIndex(v => v.id === currentVideoId);
            const nextIndex = (currentIndex + 1) % videoData.length;
            openModal(videoData[nextIndex].id);
        }

        async function load() {
            try {
                const r = await fetch('videos.json');
                videoData = await r.json();
                display(videoData);
                if(window.location.hash) openModal(window.location.hash.substring(1));
            } catch(e) { console.log("Gagal memuat data."); }
        }

        function display(data) {
            const g = document.getElementById('videoGrid');
            g.innerHTML = data.map(v => `
                <div class="video-card" onclick="openModal('${v.id}')">
                    <div class="thumb-container">
                        <img src="https://i.ytimg.com/vi/${v.id}/hqdefault.jpg" 
                             onerror="this.src='https://i.ytimg.com/vi/${v.id}/mqdefault.jpg'"
                             loading="lazy">
                    </div>
                    <div class="p-5">
                        <div class="flex items-center gap-1.5 mb-2">
                            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="#ff0000"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                            <span class="text-green-500 text-[10px] font-bold tracking-widest uppercase">SAI Roots</span>
                        </div>
                        <h3 class="font-bold text-lg mb-2 uppercase leading-tight">${v.title}</h3>
                        <p class="text-zinc-500 text-xs line-clamp">${v.description.substring(0, 120)}...</p>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id) {
            const v = videoData.find(x => x.id === id);
            if(!v) return;
            
            currentVideoId = id;
            window.location.hash = id;
            
            const m = document.getElementById('videoModal');
            m.style.display = 'block';
            m.classList.remove('minimized');
            
            if(player && player.loadVideoById) {
                player.loadVideoById(id);
            } else {
                document.getElementById('youtube-player').src = `https://www.youtube.com/embed/${id}?enablejsapi=1&autoplay=1`;
            }

            document.getElementById('mTitle').innerText = v.title;
            document.getElementById('mDesc').innerText = v.description;
            document.body.style.overflow = 'hidden';
        }

        function toggleMinimize() {
            const m = document.getElementById('videoModal');
            m.classList.toggle('minimized');
            document.body.style.overflow = m.classList.contains('minimized') ? 'auto' : 'hidden';
        }

        function closeModal() {
            if(player && player.stopVideo) player.stopVideo();
            document.getElementById('videoModal').style.display = 'none';
            document.body.style.overflow = 'auto';
            history.pushState("", document.title, window.location.pathname);
        }

        document.getElementById('searchInput').addEventListener('input', e => {
            const t = e.target.value.toLowerCase();
            display(videoData.filter(v => v.title.toLowerCase().includes(t)));
        });

        window.onload = load;
    </script>
</body>
</html>
