<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Cover | SAI Roots Music</title>
    <style>
        :root { --accent: #3b82f6; --bg: #0d0d0d; --card: #151515; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: 20px auto; }
        .card { background: var(--card); border-radius: 10px; cursor: pointer; border: 1px solid #222; overflow: hidden; }
        .thumb { width: 100%; aspect-ratio: 16/9; background-size: cover; background-position: center; }
        .info { padding: 15px; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; }
        .modal-content { max-width: 800px; margin: 40px auto; background: #111; border-radius: 12px; position: relative; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-wrapper iframe { position: absolute; top:0; left:0; width:100%; height:100%; border:0; }
    </style>
</head>
<body>
    <h1 style="text-align:center">LIST <span>VIDEO</span></h1>
    <div class="grid" id="videoGrid"></div>

    <div id="videoModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="video-wrapper" id="modalVideo"></div>
            <div style="padding:20px">
                <h2 id="modalTitle"></h2>
                <p id="modalDesc" style="white-space: pre-wrap; color: #ccc;"></p>
            </div>
        </div>
    </div>

    <script>
    // ---START_DATA---
    const videoData = [];
    // ---END_DATA---

    function render() {
        const grid = document.getElementById('videoGrid');
        grid.innerHTML = videoData.map((v, i) => `
            <div class="card" onclick="openModal(${i})">
                <div class="thumb" style="background-image:url('https://img.youtube.com/vi/${v.id}/mqdefault.jpg')"></div>
                <div class="info"><h3>${v.title}</h3></div>
            </div>
        `).join('');
    }

    function openModal(i) {
        const v = videoData[i];
        document.getElementById('modalVideo').innerHTML = `<iframe src="https://www.youtube.com/embed/${v.id}?autoplay=1" allowfullscreen></iframe>`;
        document.getElementById('modalTitle').innerText = v.title;
        document.getElementById('modalDesc').innerText = v.desc;
        document.getElementById('videoModal').style.display = 'block';
    }
    render();
    </script>
</body>
</html>
