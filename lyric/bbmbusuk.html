<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lirik resmi ${judul} oleh ${artist}. Produksi SAI Roots Music, diciptakan oleh Ahmad Supembri. Tersedia di Spotify, YouTube Music, dan Apple Music.">
    <meta name="keywords" content="${judul}, ${artist}, Ahmad Supembri, SAI Roots Music, Lirik Lagu, Official, Reggae Indonesia, Spotify Lyrics, YouTube Music Lyrics">
    <meta name="author" content="Ahmad Supembri">
    
    <meta property="og:title" content="Lirik ${judul} - ${artist}">
    <meta property="og:site_name" content="SAI Roots Music">
    <meta property="og:description" content="Official Lyric by Ahmad Supembri (SAI Roots Music)">
    <meta property="og:image" content="https://raw.githubusercontent.com/pembri/SAI-Roots-Official/main/sairoots.jpg">
    <meta property="og:url" content="https://sairootsmusic.github.io/lyric">
    <meta property="og:type" content="music.song">
    
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png">
    <link rel="manifest" href="/site.webmanifest">
    
    <meta name="theme-color" content="#000000">
    <meta name="msapplication-TileColor" content="#000000">
    
    <title>Lirik ${judul} - ${artist}</title>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        { "@type": "WebSite", "name": "SAI Roots Music", "url": "https://sairootsmusic.github.io" },
        { "@type": "BreadcrumbList", "itemListElement": [ { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://sairootsmusic.github.io" }, { "@type": "ListItem", "position": 2, "name": "Lyric", "item": "https://sairootsmusic.github.io/lyric" } ] },
        {
          "@type": "MusicRecording",
          "name": "${judul}",
          "url": "https://sairootsmusic.github.io/lyric/${slugInput}.html",
          "datePublished": "${tahun}",
          "byArtist": { "@type": "MusicGroup", "name": "${artist}" },
          "inAlbum": { "@type": "MusicAlbum", "name": "${album}" },
          "recordingOf": {
            "@type": "MusicComposition",
            "name": "${judul}",
            "lyricist": { "@type": "Person", "name": "Ahmad Supembri" },
            "composer": { "@type": "Person", "name": "Ahmad Supembri" },
            "producer": { "@type": "Person", "name": "Ahmad Supembri" },
            "copyrightHolder": { "@type": "Person", "name": "Ahmad Supembri" },
            "publisher": { "@type": "Organization", "name": "SAI Roots Music" }
          }
        },
        {
          "@type": "MusicGroup",
          "@id": "https://sairootsmusic.github.io/#artist",
          "name": "SAI Roots",
          "alternateName": ["Sairoots", "SAI Roots Official", "SAI Roots Music", "SAI Roots Indonesia", "Ahmad Supembri SAI Roots"],
          "description": "SAI Roots adalah proyek musik independen asal Indonesia...",
          "url": "https://sairootsmusic.github.io",
          "image": { "@type": "ImageObject", "url": "https://raw.githubusercontent.com/pembri/SAI-Roots-Official/main/sairoots.jpg" },
          "genre": ["Roots Reggae", "Reggae", "Rap"],
          "sameAs": [ "https://www.youtube.com/@sairoots", "https://instagram.com/ahmadsupembri" ]
        },
        {
          "@type": "Person",
          "@id": "https://sairootsmusic.github.io/#producer",
          "name": "Ahmad Supembri",
          "jobTitle": ["Songwriter", "Music Producer"],
          "url": "https://instagram.com/ahmadsupembri"
        }
      ]
    }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #0a0a0a; color: #fff; display: flex; justify-content: center; padding: 20px; }
        .wrapper { max-width: 500px; width: 100%; }
        .nav-buttons { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; }
        .nav-row { display: flex; flex-wrap: wrap; gap: 8px; }
        .btn-nav { text-decoration: none; color: #888; font-size: 11px; padding: 8px 14px; border-radius: 20px; border: 1px solid #333; transition: 0.3s; font-weight: 700; text-transform: uppercase; }
        .btn-listen { background: rgba(46, 204, 113, 0.1); border-color: #2ecc71; color: #fff; width: fit-content; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 35px; padding: 45px 35px; }
        h1 { font-size: 34px; margin: 0; letter-spacing: -1.5px; line-height: 1.1; font-weight: 700; }
        .artist { color: #2ecc71; font-size: 17px; font-weight: 700; margin-top: 5px; }
        .album-info { color: #555; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin-top: 2px; margin-bottom: 30px; }
        pre { white-space: pre-wrap; line-height: 2.1; color: #d1d1d1; margin-top: 20px; font-size: 16px; }
        .footer { text-align: center; margin-top: 60px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="nav-buttons">
        <div class="nav-row"><a href="/" class="btn-nav">Home</a><a href="/lyric" class="btn-nav">List Lyric</a></div>
        <a href="/music?song=${songParam}" class="btn-nav btn-listen">Listen to ${artist} - ${judul}</a>
    </div>
    <div class="card">
        <h1>${judul}</h1>
        <div class="artist">${artist}</div>
        <div class="album-info">${album} • ${tahun}</div>
        <pre>${lirik}</pre>
    </div>
    <div class="footer"><a href="copyright.html" style="color:#333;text-decoration:none">© 2026 SAI Roots Music. All Rights Reserved.</a></div>
</div>
</body>
</html>
