<!DOCTYPE html>
<html lang="id">
<head>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "SAI Roots Music",
      "url": "https://sairootsmusic.com"
    }
    </script>

    <link rel="canonical" href="https://sairootsmusic.com/music" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png">
    <link rel="manifest" href="/site.webmanifest">
    
    <meta name="theme-color" content="#000000">
    <meta name="msapplication-TileColor" content="#000000">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discography | SAI Roots</title>
    <meta name="description" content="Dengarkan rilisan resmi SAI Roots Music. Album Critical Fire, Reborn Riddim, dan single reggae rap terbaru.">

    <style>
        body { background: #080808; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .album-card { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
        .song-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.03); }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align: center; font-weight: 800;">Discography</h1>
    <div id="albumList"></div>
</div>

<script>
// Database diperbaiki dengan tanda kutip pada keys
const db = [
    { "t": "Critical Fire", "y": "2026", "s": ["Babylon Burn", "Propaganda", "Eksploitasi"] },
    { "t": "Reborn Riddim", "y": "2026", "s": ["Roots Medication", "Skank Patrol"] }
];

const container = document.getElementById('albumList');
db.forEach(album => {
    container.innerHTML += `
        <div class="album-card">
            <h3>${album.t} (${album.y})</h3>
            ${album.s.map(s => `<div class="song-item"><span>${s}</span> <i class="fa fa-play"></i></div>`).join('')}
        </div>
    `;
});
</script>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "MusicGroup",
      "@id": "https://sairootsmusic.com/#artist",
      "name": "SAI Roots",
      "url": "https://sairootsmusic.com"
    },
    {
      "@type": "ItemList",
      "name": "Discography List",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "item": {
            "@type": "MusicAlbum",
            "name": "Critical Fire",
            "byArtist": { "@id": "https://sairootsmusic.com/#artist" }
          }
        },
        {
          "@type": "ListItem",
          "position": 2,
          "item": {
            "@type": "MusicAlbum",
            "name": "Reborn Riddim",
            "byArtist": { "@id": "https://sairootsmusic.com/#artist" }
          }
        }
      ]
    }
  ]
}
</script>
</body>
</html>
