<!DOCTYPE html>
<html lang="id">
<head>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "SAI Roots Music",
      "url": "https://sairootsmusic.com"
    }
    </script>
    <link rel="canonical" href="https://sairootsmusic.com/dicography" />
    <title>Discography - SAI Roots Music</title>
    <meta name="description" content="Koleksi Album dan Single dari SAI Roots Music. Streaming langsung di sini.">
    <link rel="stylesheet" href="/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<header>
    <div class="logo">SAI ROOTS</div>
    <div class="nav-container">
        <input type="text" id="siteSearch" class="search-bar" placeholder="Cari musik...">
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    </div>
    <nav class="nav-menu" id="navMenu">
        <a href="/">Home</a>
        <a href="/dicography">Discography</a>
        <a href="/lyric">Koleksi Lirik</a>
        <a href="/article">Artikel</a>
        <a href="/video_cover">Video Cover</a>
        <hr style="border: 0.5px solid #333; margin: 10px 0;">
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
        <a href="/privacy">Privacy Policy</a>
    </nav>
</header>

<main style="padding: 20px 5%; margin-bottom: 120px;">
    <h1 style="margin-bottom: 30px;">Discography</h1>
    
    <div id="music-list" class="grid-container">
        <div class="music-card" onclick="playMusic('/music/contoh-lagu.mp3', 'Judul Lagu', 'Single')">
            <div style="background: #282828; aspect-ratio: 1/1; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; cursor: pointer;">
                <span style="font-size: 3rem;">🎵</span>
            </div>
            <h3 style="font-size: 1rem; margin: 0;">Judul Lagu</h3>
            <p style="color: var(--text-gray); font-size: 0.8rem;">Single</p>
        </div>
    </div>
</main>

<div id="spotify-player" class="player-container">
    <div class="player-info">
        <div id="player-title">Pilih Lagu...</div>
        <div id="player-sub" style="font-size: 0.7rem; color: var(--text-gray);">SAI Roots</div>
    </div>
    
    <div class="player-controls">
        <audio id="main-audio" src=""></audio>
        <button onclick="togglePlay()" id="play-btn" class="play-circle">▶</button>
    </div>

    <div class="player-extra">
        <button onclick="shareMusic()" style="background:none; border:none; color:white; cursor:pointer;">📤 Share</button>
    </div>
</div>

<script src="/app.js"></script>
<script>
    const audio = document.getElementById('main-audio');
    const playBtn = document.getElementById('play-btn');

    function playMusic(src, title, sub) {
        audio.src = src;
        document.getElementById('player-title').innerText = title;
        document.getElementById('player-sub').innerText = sub;
        audio.play();
        playBtn.innerText = "⏸";
        document.getElementById('spotify-player').style.display = "flex";
    }

    function togglePlay() {
        if (audio.paused) {
            audio.play();
            playBtn.innerText = "⏸";
        } else {
            audio.pause();
            playBtn.innerText = "▶";
        }
    }
</script>

</body>
</html>
