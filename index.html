function toggleSearch() {
    document.getElementById('searchBox').classList.toggle('active');
    if(document.getElementById('searchBox').classList.contains('active')) document.getElementById('searchInput').focus();
}

function toggleMenu() { document.getElementById('mobileMenu').classList.toggle('active'); }

function smartSearch() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const res = document.getElementById('searchResults');
    res.innerHTML = '';
    if (q.length < 1) { res.classList.remove('show'); return; }

    const matches = db.filter(i => i.t.toLowerCase().includes(q) || lev(q, i.t.toLowerCase()) <= 2);
    if (matches.length > 0) {
        matches.forEach(m => {
            const a = document.createElement('a');
            a.className = 'search-item';
            a.href = m.u;
            a.innerText = m.t; 
            res.appendChild(a);
        });
        res.classList.add('show');
    } else { res.classList.remove('show'); }
}

function lev(a, b) {
    const m = [];
    for (let i = 0; i <= b.length; i++) m[i] = [i];
    for (let j = 0; j <= a.length; j++) m[0][j] = j;
    for (let i = 1; i <= b.length; i++) {
        for (let j = 1; j <= a.length; j++) {
            if (b.charAt(i - 1) === a.charAt(j - 1)) m[i][j] = m[i - 1][j - 1];
            else m[i][j] = Math.min(m[i - 1][j - 1] + 1, m[i][j - 1] + 1, m[i - 1][j] + 1);
        }
    }
    return m[b.length][a.length];
}
function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(e, id) { if (e.target.id === id) document.getElementById(id).style.display = 'none'; }
