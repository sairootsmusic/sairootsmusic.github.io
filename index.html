    <style>
        :root { --accent: #1db954; --bg: #080808; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { max-width: 420px; width: 100%; background: rgba(255,255,255,0.03); border-radius: 35px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(20px); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .banner { height: 180px; background: url('https://raw.githubusercontent.com/pembri/SAI-Roots-Official/refs/heads/main/IMG_20260407_232759_337.jpg') center/cover; position: relative; }
        .banner::after { content:''; position: absolute; inset:0; background: linear-gradient(transparent, var(--bg)); }
        .profile { text-align: center; margin-top: -65px; position: relative; z-index: 5; padding: 0 20px; }
        .profile-img { width: 125px; height: 125px; border-radius: 50%; border: 4px solid var(--bg); object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .links { padding: 25px 25px 10px; }
        .link-box { display: flex; align-items: center; background: rgba(255,255,255,0.05); padding: 14px 20px; border-radius: 16px; text-decoration: none; color: #fff; margin-bottom: 10px; border: 1px solid transparent; transition: 0.3s; }
        .link-box:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); transform: translateY(-3px); }
        .link-box i { width: 30px; font-size: 18px; color: var(--accent); }
        .link-box span { font-weight: 600; font-size: 14px; flex-grow: 1; }
        .section-title { font-size: 10px; font-weight: 800; color: #444; letter-spacing: 2px; text-transform: uppercase; text-align: center; margin-top: 20px; margin-bottom: 12px; }
        .social-links { display: flex; justify-content: center; gap: 20px; padding: 0 25px 10px; flex-wrap: wrap; }
        .social-links a, .social-links span { color: #fff; font-size: 22px; opacity: 0.6; transition: 0.3s; cursor: pointer; text-decoration: none; }
        .social-links a:hover, .social-links span:hover { opacity: 1; color: var(--accent); transform: translateY(-2px); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #111; width: 85%; max-width: 350px; padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); text-align: center; animation: popUp 0.3s ease-out; }
        @keyframes popUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-btn { display: block; padding: 14px; margin-bottom: 10px; border-radius: 12px; text-decoration: none; color: #fff; font-weight: 600; font-size: 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .modal-btn:hover { background: var(--accent); color: #000; }
        .close-modal { margin-top: 15px; font-size: 11px; color: #555; cursor: pointer; display: inline-block; }
        .footer-text { text-align: center; padding: 25px; font-size: 11px; color: #444; }
    </style>
</head>

</div>

<script>
function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(e, id) { if (e.target.id === id) { document.getElementById(id).style.display = 'none'; } }
</script>
